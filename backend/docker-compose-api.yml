services:
  api:
    build: .
    container_name: greenhouse-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - greenhouse-network
  
networks:
  greenhouse-network:
    driver: bridge
