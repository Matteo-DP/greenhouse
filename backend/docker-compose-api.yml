services:
  api:
    build: .
    container_name: greenhouse-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_SENSOR_CACHE_TTL_SECONDS: ${REDIS_SENSOR_CACHE_TTL_SECONDS}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - greenhouse-network

  redis:
    image: redis:7.4-alpine
    container_name: greenhouse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - greenhouse-network
  
networks:
  greenhouse-network:
    driver: bridge
