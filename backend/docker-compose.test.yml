services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    container_name: greenhouse-test-db
    environment:
      POSTGRES_USER: greenhouse_user
      POSTGRES_PASSWORD: greenhouse_password
      POSTGRES_DB: greenhouse_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenhouse_user -d greenhouse_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - greenhouse-test-network

  redis:
    image: redis:7.4-alpine
    container_name: greenhouse-test-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - greenhouse-test-network

  api:
    build:
      context: .
    container_name: greenhouse-test-api
    environment:
      DATABASE_URL: postgresql+psycopg2://greenhouse_user:greenhouse_password@postgres:5432/greenhouse_db
      REDIS_URL: redis://redis:6379/0
      REDIS_SENSOR_CACHE_TTL_SECONDS: "3600"
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - greenhouse-test-network

  tests:
    build:
      context: .
    container_name: greenhouse-test-runner
    command: ["pytest", "-q", "integration_tests/test_full_stack_api.py"]
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - greenhouse-test-network

networks:
  greenhouse-test-network:
    driver: bridge
